<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Blankr</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='60' height='60' x='20' y='20' rx='12' fill='none' stroke='%236366f1' stroke-width='8'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body data-theme="light">
  <script>
    try {
      const s = JSON.parse(localStorage.getItem('blankr_state'));
      if (s && s.darkMode) document.body.dataset.theme = 'dark';
    } catch {}
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
